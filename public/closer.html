<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOSER — PropMind</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/closer.css">
</head>
<body class="closer-page">
    <header class="closer-header">
        <a href="/" class="pm-brand">PropMind<span class="pm-brand-dot"></span></a>
        <h1>CLOSER</h1>
        <a href="/admin.html" class="btn btn-ghost btn-sm">Dashboard</a>
    </header>

    <main class="closer-main">
        <div class="closer-input-panel">
            <p class="section-header" style="margin-bottom:1rem">Buyer input</p>
            <textarea id="buyer-input" class="closer-textarea" placeholder="What did the buyer just say? Type or paste here..."></textarea>

            <button id="analyze-btn" class="btn btn-primary w-full" style="margin-bottom:0.5rem">Analyze</button>
            <button id="emergency-btn" class="btn btn-danger w-full">Close Now</button>

            <p class="section-header" style="margin:1.5rem 0 0.75rem">Quick objections</p>
            <div class="objections-grid" id="objections-grid"></div>

            <button id="followup-btn" class="btn btn-ghost w-full" style="margin-top:1rem">Generate Follow-up</button>
        </div>

        <div class="closer-insight-panel">
            <div id="closer-loading" class="closer-loading hidden">
                <div class="loader-gold" style="margin:0 auto"></div>
                <p>Analyzing…</p>
            </div>

            <div id="closer-results" class="hidden">
                <div class="insight-card accent-gold">
                    <h4>Exact Words To Say</h4>
                    <p id="res-exact" style="font-size:1.1rem;font-weight:600"></p>
                </div>
                <div class="insight-card accent-blue">
                    <h4>Psychological Insight</h4>
                    <p id="res-psych"></p>
                </div>
                <div class="insight-card accent-red">
                    <h4>Danger Signals</h4>
                    <p id="res-danger"></p>
                </div>
                <div class="insight-card accent-green">
                    <h4>Tactic</h4>
                    <p id="res-tactic"></p>
                </div>
            </div>

            <div id="closer-text-result" class="hidden">
                <div class="insight-card accent-gold">
                    <h4 id="text-result-title">Result</h4>
                    <p id="text-result-content"></p>
                </div>
            </div>

            <div id="closer-empty" class="closer-empty">Waiting for input…</div>
        </div>
    </main>

    <script src="/js/closer.js"></script>
</body>
</html>
